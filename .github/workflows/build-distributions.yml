name: Build Distributions

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --clean --noconfirm --onefile --name DeepFakeRT app.py

      - name: Package zip artifact
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist/DeepFakeRT.exe release/
          Copy-Item README.md release/
          Compress-Archive -Path release/* -DestinationPath DeepFakeRT-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeepFakeRT-windows-x64
          path: DeepFakeRT-windows-x64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller --clean --noconfirm --onefile --name deepfake-rt app.py

      - name: Build DEB package
        run: |
          VERSION="0.1.0"
          PKG_DIR="deepfake-rt_${VERSION}_amd64"
          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/local/bin"
          mkdir -p "${PKG_DIR}/usr/share/doc/deepfake-rt"
          cp dist/deepfake-rt "${PKG_DIR}/usr/local/bin/deepfake-rt"
          chmod 755 "${PKG_DIR}/usr/local/bin/deepfake-rt"
          cp README.md "${PKG_DIR}/usr/share/doc/deepfake-rt/README.md"
          cat > "${PKG_DIR}/DEBIAN/control" << 'EOF'
          Package: deepfake-rt
          Version: 0.1.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: DeepFake-RealTime Maintainers
          Description: DeepFake Real-Time launcher and processing toolkit
           Real-time face swap and whole-head synthesis utility.
          EOF
          dpkg-deb --build "${PKG_DIR}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepfake-rt-linux-deb
          path: deepfake-rt_0.1.0_amd64.deb

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app bundle
        run: |
          pyinstaller --clean --noconfirm --windowed --name DeepFakeRT app.py

      - name: Build DMG
        run: |
          hdiutil create -volname "DeepFakeRT" -srcfolder "dist/DeepFakeRT.app" -ov -format UDZO "DeepFakeRT-macos.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeepFakeRT-macos-dmg
          path: DeepFakeRT-macos.dmg

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: DeepFakeRT-windows-x64
          path: ./release

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: deepfake-rt-linux-deb
          path: ./release

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: DeepFakeRT-macos-dmg
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}